<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>溪洲區域蘑菇戰情室</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.88);
            --accent: #2d5a27;
        }

        body {
            margin: 0;
            padding: 15px;
            font-family: "Microsoft JhengHei", sans-serif;
            background-image: url('Pikmin.jpg'); /* 從 Repo 讀取背景圖 */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .page-title {
            color: white;
            text-align: center;
            font-size: 2rem;
            letter-spacing: 2px;
            /* 增加深色文字陰影，確保在淡色背景圖上也清晰 */
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
            background: rgba(45, 90, 39, 0.6); /* 墨綠色半透明 */
            padding: 15px 40px;
            border-radius: 50px; /* 圓角膠囊造型 */
            margin: 20px 0 30px 0;
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px); /* 毛玻璃特效 */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .map-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .column { display: flex; flex-direction: column; gap: 12px; }

        .mush-card {
            background: var(--glass);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border-top: 5px solid var(--accent);
            text-align: center;
        }

        .mush-name { font-weight: bold; font-size: 1.1em; color: #1a1a1a; display: block; margin-bottom: 5px; }

        .timer-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.4em;
            color: #d32f2f;
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }

        /* 輸入框排列：時、分、秒 */
        .input-row {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
        }

        .input-row input {
            width: 100%;
            padding: 6px 2px;
            border: 1px solid #bbb;
            border-radius: 5px;
            text-align: center;
            font-size: 0.9em;
        }

        /* 設定按鈕：寬版顯示完整文字 */
        .set-btn {
            width: 100%;
            padding: 10px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.2s;
        }

        .set-btn:active { background: #1b3d17; }

        .clear-btn {
            background: transparent;
            color: #666;
            font-size: 0.8em;
            margin-top: 8px;
            border: none;
            text-decoration: underline;
            cursor: pointer;
        }

        @media (max-width: 900px) {
            .map-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<h1 class="page-title">溪洲區域蘑菇戰情室</h1>
<div class="map-grid" id="mapGrid">
    <div class="column" id="col1"></div>
    <div class="column" id="col2"></div>
    <div class="column" id="col3"></div>
    <div class="column" id="col4"></div>
</div>

<script>
    // 溪洲區域點位配置
    const points = {
        col1: ["水源運動公園", "豐田甲天下", "欣岳逸境", "基督教會"],
        col2: ["無名神像嗣", "溪洲公園", "神秘維納斯", "指示牌"],
        col3: ["天地一沙鷗變電箱", "麒麟天地"],
        col4: ["溪北公園"]
    };

    function init() {
        Object.keys(points).forEach(colId => {
            const colEl = document.getElementById(colId);
            points[colId].forEach(name => {
                colEl.innerHTML += `
                    <div class="mush-card">
                        <span class="mush-name">${name}</span>
                        <span class="timer-display" id="timer-${name}">--:--:--</span>
                        <div class="input-row">
                            <input type="number" id="h-${name}" placeholder="時" min="0">
                            <input type="number" id="m-${name}" placeholder="分" min="0" max="59">
                            <input type="number" id="s-${name}" placeholder="秒" min="0" max="59">
                        </div>
                        <button class="set-btn" onclick="calculateRebirth('${name}')">開始倒數！</button>
                    </div>
                `;
            });
        });
        setInterval(updateAllTimers, 1000);
    }

    function calculateRebirth(name) {
        const h = parseInt(document.getElementById(`h-${name}`).value) || 0;
        const m = parseInt(document.getElementById(`m-${name}`).value) || 0;
        const s = parseInt(document.getElementById(`s-${name}`).value) || 0;

        const now = Date.now();
        // 剩餘時間 + 5分鐘緩衝
        const remainingMs = (h * 3600 + m * 60 + s) * 1000;
        const bufferMs = 5 * 60 * 1000;
        const rebirthTime = now + remainingMs + bufferMs;

        localStorage.setItem(`mush_${name}`, rebirthTime);
        
        // 清空輸入
        document.getElementById(`h-${name}`).value = '';
        document.getElementById(`m-${name}`).value = '';
        document.getElementById(`s-${name}`).value = '';
    }

    function clearTimer(name) {
        localStorage.removeItem(`mush_${name}`);
    }

    function updateAllTimers() {
        const now = Date.now();
        Object.values(points).flat().forEach(name => {
            const target = localStorage.getItem(`mush_${name}`);
            const display = document.getElementById(`timer-${name}`);
            if (!target) return;

            const diff = target - now;
            if (diff <= 0) {
                display.innerText = "🍄 已重生！";
                display.style.color = "#2d5a27";
            } else {
                const totalSec = Math.floor(diff / 1000);
                const hrs = Math.floor(totalSec / 3600);
                const mins = Math.floor((totalSec % 3600) / 60);
                const secs = totalSec % 60;
                display.innerText = `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                display.style.color = "#d32f2f";
            }
        });
    }

    init();
</script>
</body>
</html>
