<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘑菇戰情室</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.85);
            --accent: #2d5a27;
        }

        body {
            margin: 0;
            padding: 15px;
            font-family: "Microsoft JhengHei", sans-serif;
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .map-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .column { display: flex; flex-direction: column; gap: 10px; }

        .mush-card {
            background: var(--glass);
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-top: 3px solid var(--accent);
        }

        .mush-name { font-weight: bold; font-size: 1em; color: #1a1a1a; }

        .timer-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2em;
            color: #d32f2f;
            font-weight: bold;
            display: block;
            margin: 5px 0;
        }

        /* 調整輸入框樣式 */
        .input-row {
            display: flex;
            gap: 2px;
            margin-top: 5px;
        }

        .input-row input {
            width: 30%;
            padding: 4px;
            border: 1px solid #ccc;
            border-radius: 3px;
            text-align: center;
            font-size: 0.8em;
        }

        .set-btn {
            width: 100%;
            margin-top: 5px;
            padding: 6px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .clear-btn {
            background: #999;
            font-size: 0.7em;
            margin-top: 3px;
            border: none;
            color: white;
            padding: 2px;
            border-radius: 3px;
            width: 100%;
        }

        @media (max-width: 900px) {
            .map-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="map-grid" id="mapGrid">
    <div class="column" id="col1"></div>
    <div class="column" id="col2"></div>
    <div class="column" id="col3"></div>
    <div class="column" id="col4"></div>
</div>

<script>
    const points = {
        col1: ["水源運動公園", "豐田甲天下", "欣岳逸境", "基督教會"],
        col2: ["無名神像嗣", "溪洲公園", "神秘維納斯", "指示牌"],
        col3: ["天地一沙鷗變電箱", "麒麟天地"],
        col4: ["溪北公園"]
    };

    function init() {
        Object.keys(points).forEach(colId => {
            const colEl = document.getElementById(colId);
            points[colId].forEach(name => {
                colEl.innerHTML += `
                    <div class="mush-card">
                        <span class="mush-name">${name}</span>
                        <span class="timer-display" id="timer-${name}">--:--:--</span>
                        <div class="input-row">
                            <input type="number" id="h-${name}" placeholder="時" min="0">
                            <input type="number" id="m-${name}" placeholder="分" min="0" max="59">
                            <input type="number" id="s-${name}" placeholder="秒" min="0" max="59">
                        </div>
                        <button class="set-btn" onclick="calculateRebirth('${name}')">設定</button>
                        <button class="clear-btn" onclick="clearTimer('${name}')">清除</button>
                    </div>
                `;
            });
        });
        setInterval(updateAllTimers, 1000);
    }

    function calculateRebirth(name) {
        const h = parseInt(document.getElementById(`h-${name}`).value) || 0;
        const m = parseInt(document.getElementById(`m-${name}`).value) || 0;
        const s = parseInt(document.getElementById(`s-${name}`).value) || 0;

        if (h === 0 && m === 0 && s === 0) return;

        const now = Date.now();
        // 總毫秒數 = (輸入的剩餘時間 + 5分鐘緩衝) 換算成毫秒
        const remainingMs = (h * 3600 + m * 60 + s) * 1000;
        const bufferMs = 5 * 60 * 1000;
        const rebirthTime = now + remainingMs + bufferMs;

        localStorage.setItem(`mush_${name}`, rebirthTime);
        
        // 清空輸入框
        document.getElementById(`h-${name}`).value = '';
        document.getElementById(`m-${name}`).value = '';
        document.getElementById(`s-${name}`).value = '';
    }

    function clearTimer(name) {
        localStorage.removeItem(`mush_${name}`);
    }

    function updateAllTimers() {
        const now = Date.now();
        Object.values(points).flat().forEach(name => {
            const target = localStorage.getItem(`mush_${name}`);
            const display = document.getElementById(`timer-${name}`);
            if (!target) return;

            const diff = target - now;
            if (diff <= 0) {
                display.innerText = "🍄 已重生！";
                display.style.color = "#2d5a27";
            } else {
                const totalSec = Math.floor(diff / 1000);
                const hrs = Math.floor(totalSec / 3600);
                const mins = Math.floor((totalSec % 3600) / 60);
                const secs = totalSec % 60;
                display.innerText = `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                display.style.color = "#d32f2f";
            }
        });
    }

    init();
</script>
</body>
</html>
