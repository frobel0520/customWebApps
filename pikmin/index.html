<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikmin 蘑菇重生追蹤器</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.85);
            --primary-color: #4CAF50;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: var(--glass-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .controls, .bg-selector {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #ddd;
        }

        input, button {
            padding: 8px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.8;
        }

        .mushroom-list {
            display: grid;
            gap: 10px;
        }

        .mushroom-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--primary-color);
        }

        .timer {
            font-weight: bold;
            color: #d32f2f;
            font-family: monospace;
            font-size: 1.2em;
        }

        .delete-btn {
            background-color: #ff5252;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🍄 蘑菇重生追蹤器</h2>
    
    <!-- 背景上傳 -->
    <div class="bg-selector">
        <label>自定義背景：</label>
        <input type="file" id="bgInput" accept="image/*">
    </div>

    <!-- 新增蘑菇 -->
    <div class="controls">
        <input type="text" id="mushName" placeholder="蘑菇地點/顏色">
        <input type="time" id="mushTime">
        <button onclick="addMushroom()">新增倒數</button>
        <p style="font-size: 0.8em; color: #666;">* 輸入消失時間，系統自動 +5 分鐘</p>
    </div>

    <div id="mushroomList" class="mushroom-list">
        <!-- 蘑菇項目會出現在這 -->
    </div>
</div>

<script>
    let mushrooms = JSON.parse(localStorage.getItem('mushrooms')) || [];

    // 背景圖處理
    document.getElementById('bgInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            document.body.style.backgroundImage = `url('${event.target.result}')`;
            localStorage.setItem('savedBg', event.target.result);
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    // 載入存檔
    window.onload = function() {
        const savedBg = localStorage.getItem('savedBg');
        if (savedBg) document.body.style.backgroundImage = `url('${savedBg}')`;
        renderList();
        setInterval(updateTimers, 1000);
    };

    function addMushroom() {
        const name = document.getElementById('mushName').value || "未知蘑菇";
        const timeVal = document.getElementById('mushTime').value;

        if (!timeVal) return alert("請輸入消失時間");

        const now = new Date();
        const [hrs, mins] = timeVal.split(':').map(Number);
        let targetDate = new Date();
        targetDate.setHours(hrs, mins, 0, 0);

        // 如果輸入的時間比現在早，假設是隔天
        if (targetDate < now) targetDate.setDate(targetDate.getDate() + 1);

        // 重生時間 = 消失時間 + 5 分鐘
        const rebirthTime = targetDate.getTime() + (5 * 60 * 1000);

        mushrooms.push({ id: Date.now(), name, target: rebirthTime });
        saveAndRender();
        document.getElementById('mushName').value = '';
    }

    function deleteMushroom(id) {
        mushrooms = mushrooms.filter(m => m.id !== id);
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem('mushrooms', JSON.stringify(mushrooms));
        renderList();
    }

    function renderList() {
        const listEl = document.getElementById('mushroomList');
        listEl.innerHTML = mushrooms.map(m => `
            <div class="mushroom-item">
                <div>
                    <strong>${m.name}</strong><br>
                    <span class="timer" id="timer-${m.id}">--:--:--</span>
                </div>
                <button class="delete-btn" onclick="deleteMushroom(${m.id})">刪除</button>
            </div>
        `).join('');
    }

    function updateTimers() {
        const now = Date.now();
        mushrooms.forEach(m => {
            const el = document.getElementById(`timer-${m.id}`);
            if (!el) return;

            const diff = m.target - now;

            if (diff <= 0) {
                el.innerHTML = "🍄 已重生！";
                el.style.color = "#4CAF50";
            } else {
                const h = Math.floor(diff / 3600000);
                const min = Math.floor((diff % 3600000) / 60000);
                const sec = Math.floor((diff % 60000) / 1000);
                el.innerHTML = `${h.toString().padStart(2, '0')}:${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
            }
        });
    }
</script>

</body>
</html>
