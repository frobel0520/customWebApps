<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>溪洲區域蘑菇戰情室</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.88);
            --accent: #2d5a27;
        }
    
        body {
            margin: 0;
            padding: 10px; /* 縮小邊距 */
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            background-image: url('Pikmin2.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 解決 Chrome 捲軸擠壓問題 */
            overflow-x: hidden; 
        }
    
        .page-title {
            color: white;
            text-align: center;
            font-size: 1.8rem; /* 稍微縮小一點標題 */
            letter-spacing: 2px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
            background: rgba(45, 90, 39, 0.7);
            padding: 12px 30px;
            border-radius: 50px;
            margin: 15px 0 20px 0;
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px); /* 增加 Webkit 前綴給 Chrome */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            width: fit-content;
        }
    
        .map-grid {
            display: grid;
            /* 使用 minmax(0, 1fr) 強制縮小內容，不讓它撐開欄位 */
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px; /* 縮小間距 */
            width: 100%;
            max-width: 1200px;
            box-sizing: border-box; /* 確保 padding 不會撐大寬度 */
            margin: 0 auto; 
            justify-content: center;
        }
    
        .column { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }
    
        .mush-card {
            background: var(--glass);
            padding: 10px 5px; /* 縮小左右內邊距 */
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            border-top: 4px solid var(--accent);
            text-align: center;
            /* 讓內容強制換行，不要撐開卡片 */
            word-break: break-all;
        }
    
        .mush-name { 
            font-weight: bold; 
            font-size: 0.95rem; /* 縮小點位名稱字體 */
            color: #1a1a1a; 
            display: block; 
            margin-bottom: 5px;
            white-space: nowrap; /* 盡量不換行 */
            overflow: hidden;
            text-overflow: ellipsis; /* 太長顯示... */
        }
    
        .timer-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            color: #d32f2f;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
    
        .input-row {
            display: flex;
            gap: 2px;
            margin-bottom: 5px;
            justify-content: center;
        }
    
        .input-row input {
            width: 40px; /* 固定輸入框寬度 */
            padding: 4px 0;
            border: 1px solid #bbb;
            border-radius: 4px;
            text-align: center;
            font-size: 0.8rem;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    
        .set-btn {
            width: 90%;
            padding: 8px 0;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
        }
    
        .clear-btn {
            background: transparent;
            color: #666;
            font-size: 0.7rem;
            margin-top: 5px;
            border: none;
            text-decoration: underline;
            cursor: pointer;
        }
    
        /* 手機版自動切換為 2 欄 */
        @media (max-width: 800px) {
            .map-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .page-title { font-size: 1.4rem; padding: 10px 20px; }
        }
    </style>
</head>
<body>
<h1 class="page-title">溪洲區域蘑菇戰情室</h1>
<div class="map-grid" id="mapGrid">
    <div class="column" id="col1"></div>
    <div class="column" id="col2"></div>
    <div class="column" id="col3"></div>
    <div class="column" id="col4"></div>
</div>

<script>
    // 溪洲區域點位配置
    const points = {
        col1: ["水源運動公園", "豐田甲天下", "欣岳逸境", "基督教會"],
        col2: ["無名神像嗣", "溪洲公園", "神秘維納斯", "指示牌"],
        col3: ["天地一沙鷗變電箱", "麒麟天地"],
        col4: ["溪北公園"]
    };

    function init() {
        Object.keys(points).forEach(colId => {
            const colEl = document.getElementById(colId);
            points[colId].forEach(name => {
                colEl.innerHTML += `
                    <div class="mush-card">
                        <span class="mush-name">${name}</span>
                        <span class="timer-display" id="timer-${name}">--:--:--</span>
                        <div class="input-row">
                            <input type="number" id="h-${name}" placeholder="時" min="0">
                            <input type="number" id="m-${name}" placeholder="分" min="0" max="59">
                            <input type="number" id="s-${name}" placeholder="秒" min="0" max="59">
                        </div>
                        <button class="set-btn" onclick="calculateRebirth('${name}')">開始倒數！</button>
                    </div>
                `;
            });
        });
        setInterval(updateAllTimers, 1000);
    }

    function calculateRebirth(name) {
        const h = parseInt(document.getElementById(`h-${name}`).value) || 0;
        const m = parseInt(document.getElementById(`m-${name}`).value) || 0;
        const s = parseInt(document.getElementById(`s-${name}`).value) || 0;

        const now = Date.now();
        // 剩餘時間 + 5分鐘緩衝
        const remainingMs = (h * 3600 + m * 60 + s) * 1000;
        const bufferMs = 5 * 60 * 1000;
        const rebirthTime = now + remainingMs + bufferMs;

        localStorage.setItem(`mush_${name}`, rebirthTime);
        
        // 清空輸入
        document.getElementById(`h-${name}`).value = '';
        document.getElementById(`m-${name}`).value = '';
        document.getElementById(`s-${name}`).value = '';
    }

    function clearTimer(name) {
        localStorage.removeItem(`mush_${name}`);
    }

    function updateAllTimers() {
        const now = Date.now();
        Object.values(points).flat().forEach(name => {
            const target = localStorage.getItem(`mush_${name}`);
            const display = document.getElementById(`timer-${name}`);
            if (!target) return;

            const diff = target - now;
            if (diff <= 0) {
                display.innerText = "🍄 已重生！";
                display.style.color = "#2d5a27";
            } else {
                const totalSec = Math.floor(diff / 1000);
                const hrs = Math.floor(totalSec / 3600);
                const mins = Math.floor((totalSec % 3600) / 60);
                const secs = totalSec % 60;
                display.innerText = `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                display.style.color = "#d32f2f";
            }
        });
    }

    init();
</script>
</body>
</html>
