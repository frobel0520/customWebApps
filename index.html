<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台股自選清單</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #e8e8e6;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 620px; margin: 0 auto; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .title { font-size: 20px; font-weight: 500; color: #f0f0ee; }
    .updated { font-size: 12px; color: #666; }

    .add-row { display: flex; gap: 8px; margin-bottom: 1rem; }

    input {
      flex: 1;
      padding: 8px 12px;
      font-size: 15px;
      border: 1px solid #333;
      border-radius: 8px;
      outline: none;
      background: #252525;
      color: #e8e8e6;
      transition: border-color 0.15s;
    }

    input::placeholder { color: #555; }
    input:focus { border-color: #378ADD; }

    button {
      padding: 8px 16px;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #252525;
      color: #e8e8e6;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button:hover { background: #2e2e2e; }
    button:active { transform: scale(0.97); }

    button.primary {
      background: #185FA5;
      color: #fff;
      border-color: #185FA5;
    }

    button.primary:hover { background: #378ADD; border-color: #378ADD; }

    .error-msg {
      font-size: 13px;
      color: #F0997B;
      background: #2a1a14;
      border: 1px solid #3a2218;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 1rem;
      display: none;
    }

    .stock-card {
      background: #222;
      border: 1px solid #2e2e2e;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.15s;
    }

    .stock-card:hover { border-color: #3a3a3a; }

    .stock-left { display: flex; flex-direction: column; gap: 3px; }
    .stock-symbol { font-size: 15px; font-weight: 500; color: #f0f0ee; }
    .stock-name { font-size: 12px; color: #666; }

    .stock-right { display: flex; align-items: center; gap: 12px; }

    .stock-price {
      font-size: 20px;
      font-weight: 500;
      color: #f0f0ee;
      font-variant-numeric: tabular-nums;
    }

    .stock-change {
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      text-align: right;
      min-width: 80px;
      line-height: 1.5;
    }

    .up { color: #F09595; }
    .down { color: #5DCAA5; }
    .flat { color: #666; }

    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #444;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
    }

    .del-btn:hover { color: #F09595; background: #2a1a1a; }

    .loading { color: #555; font-size: 13px; }

    .empty-hint {
      text-align: center;
      color: #444;
      font-size: 14px;
      padding: 3rem 0;
    }

    .date-badge {
      display: inline-block;
      font-size: 11px;
      color: #555;
      background: #222;
      border: 1px solid #2e2e2e;
      border-radius: 6px;
      padding: 3px 8px;
      margin-bottom: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="title">台股自選清單</span>
      <span class="updated" id="updated-time"></span>
    </div>

    <div class="add-row">
      <input type="text" id="inp-symbol" placeholder="輸入股票代號，如 2330" maxlength="6">
      <button class="primary" onclick="addStock()">新增</button>
      <button onclick="refreshAll()">重新整理</button>
    </div>

    <div class="error-msg" id="err-msg"></div>
    <div id="date-area"></div>
    <div id="stock-list"></div>
  </div>

  <script>
    const TOKEN = 'eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJkYXRlIjoiMjAyNi0wNC0xMyAxMzo0NzoxNyIsInVzZXJfaWQiOiJmcm9iZWwwNTIwIiwiZW1haWwiOiJmcm9iZWwwNTIwQGdtYWlsLmNvbSIsImlwIjoiMjIwLjE0MS4zMC4xMzcifQ.eQy5ACaSSNslI4SCzSfTDglCaBiDq07mA1NY_RKGPoM';

    let watchlist = JSON.parse(localStorage.getItem('twse-watchlist-v2') || 'null') || [
      { symbol: '2330', name: '台積電' },
      { symbol: '2454', name: '聯發科' },
      { symbol: '2317', name: '鴻海' },
    ];

    let priceData = {};
    let dataDate = '';

    function saveList() {
      localStorage.setItem('twse-watchlist-v2', JSON.stringify(watchlist));
    }

    function renderList() {
      const el = document.getElementById('stock-list');
      const dateEl = document.getElementById('date-area');

      if (dataDate) {
        dateEl.innerHTML = `<span class="date-badge">資料日期：${dataDate}</span>`;
      }

      if (watchlist.length === 0) {
        el.innerHTML = '<div class="empty-hint">尚未新增任何股票</div>';
        return;
      }

      el.innerHTML = watchlist.map(s => {
        const d = priceData[s.symbol];
        let priceHtml = '<span class="loading">載入中...</span>';
        let changeHtml = '';

        if (d && d.price != null) {
          const change = d.change;
          const pct = d.pct;
          const cls = change > 0 ? 'up' : change < 0 ? 'down' : 'flat';
          const sign = change > 0 ? '+' : '';
          priceHtml = `<span class="stock-price">${d.price.toFixed(2)}</span>`;
          changeHtml = `<span class="stock-change ${cls}">${sign}${change.toFixed(2)}<br>${sign}${pct.toFixed(2)}%</span>`;
        } else if (d && d.error) {
          priceHtml = '<span class="loading">無法取得</span>';
        }

        return `
          <div class="stock-card">
            <div class="stock-left">
              <span class="stock-symbol">${s.symbol}</span>
              <span class="stock-name">${s.name}</span>
            </div>
            <div class="stock-right">
              ${priceHtml}
              ${changeHtml}
              <button class="del-btn" onclick="removeStock('${s.symbol}')">✕</button>
            </div>
          </div>`;
      }).join('');
    }

    async function fetchPrice(symbol) {
      try {
        const today = new Date();
        const start = new Date(today);
        start.setDate(start.getDate() - 10);
        const fmt = d => d.toISOString().split('T')[0];

        const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${symbol}&start_date=${fmt(start)}&end_date=${fmt(today)}&token=${TOKEN}`;
        const res = await fetch(url);
        const json = await res.json();

        if (!json.data || json.data.length === 0) return { error: true };

        const rows = json.data;
        const last = rows[rows.length - 1];
        const prev = rows.length >= 2 ? rows[rows.length - 2] : null;

        const price = parseFloat(last.close);
        const prevClose = prev ? parseFloat(prev.close) : parseFloat(last.open);
        const change = price - prevClose;
        const pct = (change / prevClose) * 100;

        if (last.date && (!dataDate || last.date > dataDate)) {
          dataDate = last.date;
        }

        return { price, change, pct };
      } catch (e) {
        return { error: true };
      }
    }

    async function refreshAll() {
      const updEl = document.getElementById('updated-time');
      updEl.textContent = '更新中...';
      dataDate = '';
      renderList();

      await Promise.all(watchlist.map(async s => {
        priceData[s.symbol] = await fetchPrice(s.symbol);
      }));

      saveList();
      renderList();

      const now = new Date();
      updEl.textContent = '更新：' +
        now.getHours().toString().padStart(2,'0') + ':' +
        now.getMinutes().toString().padStart(2,'0') + ':' +
        now.getSeconds().toString().padStart(2,'0');
    }

    async function addStock() {
      const inp = document.getElementById('inp-symbol');
      const errEl = document.getElementById('err-msg');
      const symbol = inp.value.trim().replace(/\D/g, '');

      if (!symbol) return;

      if (watchlist.find(s => s.symbol === symbol)) {
        errEl.textContent = `${symbol} 已在清單中`;
        errEl.style.display = 'block';
        return;
      }

      errEl.style.display = 'none';
      watchlist.push({ symbol, name: symbol });
      inp.value = '';
      renderList();

      const data = await fetchPrice(symbol);
      priceData[symbol] = data;

      if (data.error) {
        errEl.textContent = `找不到 ${symbol}，請確認代號是否正確`;
        errEl.style.display = 'block';
        watchlist = watchlist.filter(s => s.symbol !== symbol);
      }

      saveList();
      renderList();
    }

    function removeStock(symbol) {
      watchlist = watchlist.filter(s => s.symbol !== symbol);
      delete priceData[symbol];
      saveList();
      renderList();
    }

    document.getElementById('inp-symbol').addEventListener('keydown', e => {
      if (e.key === 'Enter') addStock();
    });

    refreshAll();
  </script>
</body>
</html>
